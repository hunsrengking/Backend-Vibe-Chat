services:
  - type: web
    name: backend
    region: oregon
    runtime: dockerfile
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://vibe-chat-service.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: ${PGHOST}
      - key: DB_PORT
        value: ${PGPORT}
      - key: DB_DATABASE
        value: ${PGDATABASE}
      - key: DB_USERNAME
        value: ${PGUSER}
      - key: DB_PASSWORD
        value: ${PGPASSWORD}
      - key: DB_SSLMODE
        value: require
      - key: SANCTUM_STATEFUL_DOMAINS
        value: https://vibechat-zeta.vercel.app
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
